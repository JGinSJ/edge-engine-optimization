#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

# NOTE: distinct application name on purpose. Deploying this creates a SEPARATE
# Fermyon Cloud app + URL, isolated from the shared `akamai-ai-markdown`
# (bede2402…fwf.app) used by the other three projects. Only the
# harper-cache-pipeline property's PMUSER_WASM_URL should point here. Once the
# Harper write-back is proven, fold it into the shared converter and redeploy.
[application]
name = "harper-cache-markdown"
version = "0.1.0"
authors = ["Jorge Geronimo"]
description = "HTML→Markdown converter with opt-in Harper write-through (isolated copy for harper-cache-pipeline)"

[[trigger.http]]
route = "/..."
component = "akamai-ai-markdown"

[component.akamai-ai-markdown]
source = "target/wasm32-wasip1/release/akamai_ai_markdown.wasm"
allowed_outbound_hosts = ["https://*:*"]

[component.akamai-ai-markdown.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
